    <article>
      <h2>社会</h2>
<section>
        <h3>和菓子店も「トリックオアトリート！」</h3>

        <p>
          日本でも年々人気の高まるハロウィン。<br>
          今年は大手和菓子店5社がハロウィン向けの和菓子セットを共同開発しました。
        </p>
        <audio controls>
         <source src="kadai_008_ichi.mp3" type="audio/mpeg">
        </audio>
</section>
      <section>
        <h3>私のおすすめ和菓子アンケートフォーム</h3>
        <form>
          <label for="name">氏名</label><br>
           <input type="text" id="name" placeholder="名前を入力してください"><br><br>

           <label for="age">年代</label><br>
           <select id="age">
           <option>10代以下</option>
           <option>20代</option>
           <option>30代</option>
           <option>40代以上</option>
           </select><br><br>

          <label>性別</label><br>
          <input type="radio" id="male" name="gender">
          <label for="male">男性</label>

          <input type="radio" id="female" name="gender">
          <label for="female">女性</label>

          <input type="radio" id="other" name="gender">
          <label for="other">その他</label>
         <br><br>

         <label for="sweet">おすすめ和菓子の名称</label><br>
         <input type="text" id="sweet" placeholder="例：みたらし団子"><br><br>

         <label for="reason">おすすめする理由</label><br>
         <textarea id="reason"></textarea><br><br>

         <input type="checkbox" id="agree">
         <label for="agree">個人情報保護方針に同意する</label><br><br>

         <input type="submit" value="送信">
         <input type="reset" value="リセット">
        </form>
      </section>
    </article>

     動画の内容はHTML/CSSの解説です。
